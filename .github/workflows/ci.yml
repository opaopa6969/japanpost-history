name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install local dependencies
        run: |
          mvn install:install-file \
            -Dfile=local-repo/municipality-history-1.0.0.jar \
            -DpomFile=local-repo/municipality-history-1.0.0.pom \
            -Dpackaging=jar \
            -DgroupId=org.unlaxer \
            -DartifactId=municipality-history \
            -Dversion=1.0.0

      - name: Run tests
        run: mvn -B test -DskipGpg=true -Dgpg.skip=true
